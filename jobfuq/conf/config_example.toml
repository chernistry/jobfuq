#######################################
#           GENERAL SETTINGS          #
#######################################

# Time filter for job postings (in seconds)
# This defines how recent job postings should be considered.
time_filter = "604800"  # 7 days

# Number of concurrent job details to process
# Controls how many job detail pages are fetched in parallel.
concurrent_details = 7

# Maximum number of job postings to fetch per query
# This prevents excessive data collection.
max_postings = 100

# Delay before retrying failed extractions (in seconds)
retry_delay = 180  # 3 minutes

#######################################
#         DATABASE CONFIGURATION      #
#######################################

# Database path for storing DevOps job listings
# Use a dummy or default path for now
db_path = "data/test_job_listings.db"

# Path to store blacklisted companies/jobs
# This file should store blacklisted entries in a json format
blacklist_path = "data/blacklist.json"

#######################################
#         WEB SCRAPING SETTINGS       #
#######################################

# List of User-Agent headers for web scraping
# These help simulate different browsers to avoid bot detection.
user_agents = [
  "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36",
  "Mozilla/5.0 (Macintosh; Intel Mac OS X 13_2) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36",
  "Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:120.0) Gecko/20100101 Firefox/120.0",
  "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36",
  "Mozilla/5.0 (iPhone; CPU iPhone OS 17_2 like Mac OS X) AppleWebKit/537.36 (KHTML, like Gecko) Version/17.2 Mobile/15E148 Safari/537.36",
  "Mozilla/5.0 (Android 14; Mobile; rv:120.0) Gecko/120.0 Firefox/120.0",
  "Mozilla/5.0 (iPad; CPU OS 17_2 like Mac OS X) AppleWebKit/537.36 (KHTML, like Gecko) Version/17.2 Mobile/15E148 Safari/537.36"
]

#######################################
#         JOB SEARCH QUERIES          #
#######################################

# List of search queries for job scraping
[[search_queries]]
keywords = "DevOps engineer"
location = "Israel"
f_WT = "1"  # 1 = On-Site, 2 = Remote, 3 = Hybrid

[[search_queries]]
keywords = "LLM engineer"
location = "Israel"
f_WT = "1"

[[search_queries]]
keywords = "Prompt engineer"
location = "Israel"
f_WT = "1"

[[search_queries]]
keywords = "Junior DevOps engineer"
location = "Israel"
f_WT = "1"

[[search_queries]]
keywords = "Infrastructure Engineer"
location = "Israel"
f_WT = "1"

#######################################
#      LINKEDIN CREDENTIALS (AUTH)    #
#######################################

# LinkedIn login credentials (use multiple accounts for load balancing)
# Replace with dummy email and password (do not push real credentials)
[linkedin_credentials]

[linkedin_credentials."1"]
username = "example1@email.com"
password = "examplepassword123"

[linkedin_credentials."2"]
username = "example2@email.com"
password = "anotherpassword456"

#######################################
#   AI PROVIDERS & API CONFIGURATION  #
#######################################

# Provider mode determines which AI models are used
# Options: "together", "openrouter", "multi" (both)
provider_mode = "together"

# Number of concurrent AI evaluations (each with a unique API key if available)
threads = 4

# Together AI provider settings
together_api_key = "dummy_api_key_together"
together_model = "deepseek-ai/DeepSeek-R1"
together_rpm = 6  # API rate limit (requests per minute)

# OpenRouter AI provider settings
openrouter_api_keys = [
  "dummy_api_key_openrouter"
]
openrouter_model = "deepseek/deepseek-r1:free"

#######################################
#      AI PROMPT CONFIGURATION        #
#######################################

# AI prompt template for career advisor evaluation
# This file contains the prompt structure that guides AI evaluations.
prompt = "prompts/example_prompt_file.txt"
